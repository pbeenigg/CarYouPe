services:
  caddy:
    image: caddy:2.11.1
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
      - ./certs:/etc/caddy/certs:ro
    networks:
      - baota_net
    depends_on:
      - gitea
    healthcheck:
      test: ["CMD-SHELL", "caddy version"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:14.22
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    networks:
      - baota_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    networks:
      - baota_net
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  gitea:
    image: gitea/gitea:1.25.4
    container_name: gitea
    restart: unless-stopped
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: ${POSTGRES_DB}
      GITEA__database__USER: ${POSTGRES_USER}
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD}
      GITEA__database__CHARSET: utf8mb4
      GITEA__cache__ENABLED: true
      GITEA__cache__ADAPTER: redis
      GITEA__cache__HOST: redis://:${REDIS_PASSWORD}@redis:6379/0?pool_size=100&idle_timeout=180s
      GITEA__cache__ITEM_TTL: 16h
      GITEA__session__PROVIDER: redis
      GITEA__session__PROVIDER_CONFIG: redis://:${REDIS_PASSWORD}@redis:6379/0?pool_size=100&idle_timeout=180s
      GITEA__queue__TYPE: redis
      GITEA__queue__CONN_STR: redis://:${REDIS_PASSWORD}@redis:6379/0?pool_size=100&idle_timeout=180s
      GITEA__server__DOMAIN: ${GITEA_DOMAIN}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL}
      GITEA__server__HTTP_PORT: 3000
      GITEA__security__INSTALL_LOCK: true
      GITEA__service__DISABLE_REGISTRATION: false
      GITEA__admin__USERNAME: ${GITEA_ADMIN_USER}
      GITEA__admin__PASSWORD: ${GITEA_ADMIN_PASSWORD}
      GITEA__admin__EMAIL: ${GITEA_ADMIN_EMAIL}
    volumes:
      - ./data/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - baota_net
    ports:
      - "${GITEA_PORT:-13000}:3000"
      - "${GITEA_SSH_PORT:-2222}:22"
    healthcheck:
      test: ["CMD-SHELL", "gitea admin user list"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  portainer:
    container_name: portainer
    image: 6053537/portainer-ce:2.33.6
    ports:
      - "${PORTAINER_PORT:-19000}:9000"
      - "${PORTAINER_API_PORT:-18000}:8000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    networks:
      - baota_net

networks:
  baota_net:
    external: true
