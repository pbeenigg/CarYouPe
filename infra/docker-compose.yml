services:
  caddy:
    image: caddy:2-alpine
    platform: linux/amd64
    container_name: caddy-infra
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
      - ./certs:/etc/caddy/certs:ro
    networks:
      - caryoupe
    depends_on:
      - gitea

  postgres:
    image: postgres:14-alpine
    platform: linux/amd64
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - caryoupe
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caryoupe -d gitea"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    networks:
      - caryoupe
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  gitea:
    image: gitea/gitea:1.25.4
    platform: linux/amd64
    container_name: gitea
    restart: unless-stopped
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: ${DB_NAME}
      GITEA__database__USER: ${DB_USER}
      GITEA__database__PASSWD: ${DB_PASSWORD}
      GITEA__cache__ENABLED: true
      GITEA__cache__ADAPTER: redis
      GITEA__cache__HOST: redis://:${REDIS_PASSWORD}@redis:6379/0?pool_size=100&idle_timeout=180s
      GITEA__cache__ITEM_TTL: 16h
      GITEA__session__PROVIDER: redis
      GITEA__session__PROVIDER_CONFIG: redis://:${REDIS_PASSWORD}@redis:6379/0?pool_size=100&idle_timeout=180s
      GITEA__queue__TYPE: redis
      GITEA__queue__CONN_STR: redis://:${REDIS_PASSWORD}@redis:6379/0?pool_size=100&idle_timeout=180s
      GITEA__server__DOMAIN: ${GITEA_DOMAIN}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL}
      GITEA__server__HTTP_PORT: 3000
      GITEA__security__INSTALL_LOCK: true
      GITEA__service__DISABLE_REGISTRATION: false
      GITEA__admin__USERNAME: ${GITEA_ADMIN_USER}
      GITEA__admin__PASSWORD: ${GITEA_ADMIN_PASSWORD}
      GITEA__admin__EMAIL: ${GITEA_ADMIN_EMAIL}
    volumes:
      - ./data/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - caryoupe
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"

networks:
  caryoupe:
    external: false
