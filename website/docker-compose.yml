# VERSION 用于镜像标签，需在同目录 .env 中设置，或 export VERSION=1.0.0（.env.local 仅注入容器，不参与此处替换）
services:
  website:
    image: caryoupe-website:${VERSION:-latest}
    platform: linux/amd64
    pull_policy: never
    container_name: caryoupe-website
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080:3000"
    networks:
      - baota_net

networks:
  baota_net:
    external: true
